<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiss Stop</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="mobile">
        <div class="header" style="display: flex; justify-content: center; align-items: center; background: white; padding: 20px; border-bottom: 1px solid #f3dede;">
            <img src="assets/img/logo.png" class="logo" alt="Logo Kiss Stop" style="width: 120px;">
        </div>

        <div class="container">
            <h1 class="title" style="text-align: center; margin-top: 40px;">Bem-vindo</h1>
            <p class="subtitle" style="text-align: center;">Entre na sua conta</p>

            <div class="input-group">
                <label>Email</label>
                <input type="email" class="input" placeholder="seu@email.com">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" class="input" placeholder="******">
            </div>

            <a href="home.html" class="button-link" style="display: block; text-align: center; text-decoration: none;">
                Entrar
            </a>

            <a href="cadastro.html" class="button-outline-link" style="display: block; text-align: center; text-decoration: none; margin-top: 10px;">
                Criar conta
            </a>
        </div>
    </div>
</body>
