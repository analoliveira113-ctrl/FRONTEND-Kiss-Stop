<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Kiss Stop</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="header">
        <img src="assets/img/logo.png" class="logo">
    </div>

    <div class="mobile">
        <div class="container">
            <h1 class="title">Criar Conta</h1>
            <p class="subtitle">Cadastre-se para começar</p>

            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" class="input" placeholder="Digite seu nome">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" class="input" placeholder="seu@email.com">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" class="input" placeholder="******">
            </div>

            <button type="button" class="button-link" onclick="realizarCadastro()" style="width: 100%; border: none; cursor: pointer; display: block; text-align: center;">
                Finalizar Cadastro
            </button>

            <a href="index.html" class="button-outline-link">Já tenho conta</a>
        </div>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
